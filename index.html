<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perdón</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene" id="scene">
    <div class="bg bg1"></div>
    <div class="bg bg2"></div>

    <section class="stage" id="stage">
      <div class="orbit-system" id="orbitSystem">
        <div class="orbit orbit-1" id="orbit1"></div>
        <div class="orbit orbit-2" id="orbit2"></div>
        <div class="orbit orbit-3" id="orbit3"></div>
      </div>

      <div class="center-wrap">
        <div class="gif-halo"></div>

        <div class="photo-card" id="photoCard">
          <div class="photo-inner">
            <div class="photo-face front">
              <img src="foto.jpeg" alt="foto" />
            </div>

            <div class="photo-face back">
              <img
                src="https://downloadwap.com/thumbs3/screensavers/d/new/animals/puss_in_boots-7372.gif"
                alt="gif"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="actions">
      <button id="flipBtn">Girar foto</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
